{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Autorización — {{ trabajador.usuario.get_full_name }}</h5>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Estado</label>
            <select name="estado" class="form-select">
              <option value="pendiente"  {% if autorizacion.estado == 'pendiente'  %}selected{% endif %}>Pendiente</option>
              <option value="autorizado" {% if autorizacion.estado == 'autorizado' %}selected{% endif %}>Autorizado</option>
              <option value="rechazado"  {% if autorizacion.estado == 'rechazado'  %}selected{% endif %}>Rechazado</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="4"
              placeholder="Observaciones finales...">{{ autorizacion.observaciones }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Guardar autorización</button>
            <a href="{% url 'autorizaciones:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
